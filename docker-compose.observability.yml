# VTOP Engine — OPTIONAL observability stack.
#
# Grafana LGTM: Alloy (collect) -> Mimir (metrics) / Loki (logs) / Tempo (traces),
# with Grafana on top. Kept in a separate file so the default lab stays light;
# nothing here is required to run VTOP.
#
# Bring up (alongside the lab):
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
#
# Grafana:  http://localhost:3400   (admin / admin, anonymous viewing enabled)
# Alloy UI: http://localhost:12345  (shows which scrape targets are actually UP)
#
# Ports are deliberately off the defaults (3400 not 3000): 3000/8080 are common
# and collide with other local stacks.
#
# HONEST SCOPE — read before trusting a panel:
#   * The VTOP engine exposes its OWN Prometheus metrics (issue #46) at
#     VTOP_METRICS_ADDR, so it is scraped directly. Logs remain the place for the
#     high-cardinality detail (batch_id, object URIs) that must never be a label.
#   * MinIO exposes Prometheus natively (auth disabled below - LAB ONLY).
#   * Kafka exposes no Prometheus endpoint, hence the exporter sidecar.
#   * Every backend here is single-node with filesystem storage and lab
#     credentials. This is NOT a production topology.

services:
  # --- MinIO: enable public metrics scraping (LAB ONLY) ---------------------
  # MinIO metrics are made public in the BASE docker-compose.yml (so the
  # endpoint is scrapeable regardless of how the lab is started), not here.

  # --- Kafka -> Prometheus --------------------------------------------------
  # The apache/kafka image exposes no Prometheus endpoint. This exporter talks
  # to the broker over the KAFKA PROTOCOL (not JMX) and exposes consumer-group
  # lag and topic offsets - which is exactly what the invariant story needs.
  # Without it the Kafka dashboard shows its target as DOWN rather than silently
  # graphing nothing.
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    container_name: vtop-kafka-exporter
    command:
      - "--kafka.server=kafka:9092"
      - "--web.listen-address=:9308"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # --- Metrics store --------------------------------------------------------
  mimir:
    image: grafana/mimir:3.1.3
    container_name: vtop-mimir
    command: ["-config.file=/etc/mimir/mimir.yaml"]
    volumes:
      - ./observability/mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - mimir-data:/data
    restart: unless-stopped

  # --- Log store ------------------------------------------------------------
  loki:
    image: grafana/loki:3.7.3
    container_name: vtop-loki
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    restart: unless-stopped

  # --- Trace store ----------------------------------------------------------
  tempo:
    image: grafana/tempo:3.0.2
    container_name: vtop-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    restart: unless-stopped

  # --- Collector ------------------------------------------------------------
  # Needs the docker socket to discover containers and read their logs. Mounted
  # read-only; still a privileged handle, which is another reason this stack is
  # lab-only.
  alloy:
    image: grafana/alloy:v1.17.1
    container_name: vtop-alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "12345:12345"   # Alloy UI: shows which targets are actually UP
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      - mimir
      - loki
      - tempo
    restart: unless-stopped

  # --- Dashboards -----------------------------------------------------------
  grafana:
    image: grafana/grafana:13.1.0
    container_name: vtop-grafana
    ports:
      # Bound to LOOPBACK deliberately. Anonymous access below grants Editor
      # rights with no sign-in, so a 0.0.0.0 bind would let anyone routable to
      # this host modify or delete every dashboard. Publishing the port and
      # granting anonymous Editor are only jointly safe if the port is not
      # reachable off-box. Change this only if you also disable anonymous auth.
      - "127.0.0.1:3400:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Anonymous access with EDITOR rights: this is a local lab, so anyone who
      # opens it can edit AND save dashboards without signing in. LAB ONLY -
      # never expose this stack on a shared network (see issue #81).
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Editor
      GF_USERS_DEFAULT_THEME: dark
      # The draw.io pipeline dashboard uses the Flow panel (React, signed,
      # Grafana >= 10) - the maintained successor to the AngularJS flowcharting
      # plugin, which does not load on Grafana 11+. Installed on first boot.
      GF_INSTALL_PLUGINS: andrewbmchugh-flow-panel
      # Datasources are provisioned as code. Dashboards are SEEDED VIA THE API
      # by the grafana-seed service below, because Grafana 13 makes
      # file-provisioned dashboards read-only in the UI and this lab is meant to
      # be explored and edited.
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      # Tech logos for the Canvas pipeline diagram, served from Grafana's public
      # path so the Canvas icons use stable local URLs (public/img/vtop/*.svg)
      # and render with no internet.
      - ./observability/grafana/assets:/usr/share/grafana/public/img/vtop:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - mimir
      - loki
      - tempo
    restart: unless-stopped

  # Seeds the dashboards through the Grafana API once Grafana is healthy.
  #
  # Deliberately NOT file-provisioning: Grafana 13 refuses "Save" on a
  # file-provisioned dashboard ("Cannot save provisioned dashboard"), and
  # allowUiUpdates no longer changes that. Seeded dashboards are ordinary ones -
  # fully editable and saveable - which is what a lab wants.
  #
  # Re-run to reset the lab to the repo's dashboards:
  #   docker compose -f docker-compose.yml -f docker-compose.observability.yml \
  #       up --force-recreate grafana-seed
  grafana-seed:
    image: curlimages/curl:8.11.1
    container_name: vtop-grafana-seed
    depends_on:
      - grafana
    entrypoint: ["/bin/sh", "/seed-dashboards.sh"]
    environment:
      GRAFANA_URL: http://grafana:3000
      GRAFANA_USER: admin
      GRAFANA_PASSWORD: admin
      DASHBOARD_DIR: /dashboards
      GRAFANA_FOLDER: VTOP
    volumes:
      - ./observability/seed-dashboards.sh:/seed-dashboards.sh:ro
      - ./observability/grafana/dashboards:/dashboards:ro
    restart: "no"


volumes:
  mimir-data:
  loki-data:
  tempo-data:
  alloy-data:
  grafana-data:
