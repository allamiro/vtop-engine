# VTOP Engine configuration (prototype / reference implementation).
#
# Secrets (access keys, passwords) are NEVER placed in this file. They are read
# from environment variables or mounted secrets. See docs/SECURITY_MODEL.md.

engine:
  name: vtop-engine
  tenant: default
  # SQLite paths may be inline. For PostgreSQL, replace this line with one of:
  #   state_store: { env: VTOP_STATE_STORE }
  #   state_store: { file: /run/secrets/vtop-state-store }
  # The resolved remote URL must include sslmode=verify-full (and sslrootcert
  # for a private CA that is not in the bundled public trust roots). Inline
  # PostgreSQL URLs are rejected so credentials never enter serializable config.
  state_store: "sqlite:///data/state/vtop-state.db"
  work_dir: /data/work
  # Successful batches remove staging files immediately. These limits clean up
  # artifacts left by a crash and cap their aggregate disk use on restart.
  work_retention_seconds: 86400
  work_max_bytes: 10737418240
  log_level: INFO

batching:
  max_records: 10000
  max_bytes: 104857600
  max_batch_age_seconds: 60
  # Polling. Both are optional; these are the defaults.
  #
  # source_poll_wait_ms is paid PER SOURCE, serially: an EMPTY source burns the
  # whole window before returning nothing, so a cycle over N idle Kafka topics
  # costs up to N * this. A backlogged topic returns immediately (Kafka
  # prefetches), so lowering this speeds up idle scanning without hurting
  # throughput. Raise it if a broker is slow enough that reads come back empty
  # when data is in fact available.
  source_poll_wait_ms: 250
  # Pause between cycles ONLY when the previous cycle read nothing. A cycle
  # that read data loops straight into the next one, so a backlog drains at
  # read speed rather than being throttled by this timer.
  idle_poll_interval_ms: 2000

compression:
  # zstd, not gzip. Measured on 13 MB of this lab's own CEF traffic:
  #
  #   gzip -6 (the code default)    32 MB/s    3.48x
  #   gzip -1                      114 MB/s    2.90x
  #   zstd -1                      417 MB/s    ~3.1x
  #   zstd -9                         -        3.68x
  #
  # zstd level 3 sits in the middle: a better ratio than gzip -1 at several
  # times gzip -6's throughput. Compression was the largest CPU cost in the
  # pipeline, so this is the cheapest available win.
  #
  # The CODE default is still gzip/6 — deliberately. Changing it would change
  # the output format for every config that omits these fields, and existing
  # objects/manifests record the codec they were written with. Set it here
  # explicitly instead, so the choice is visible and opt-in.
  type: zstd          # gzip | zstd | none
  level: 3

# Optional manifest authentication. The config stores only this environment
# variable NAME; its value must be a 32-byte key encoded as 64 hex characters.
# A configured-but-missing/malformed key is a startup error. Enabling it
# deliberately rejects unsigned pre-cutover manifests during verification and
# recovery, so verify any backlog before the cutover. Single-key rotation is
# not implemented yet.
# manifest_mac_key_env: VTOP_MANIFEST_MAC_KEY

sources:
  kafka:
    enabled: true
    bootstrap_servers:
      - kafka:9092
    consumer_group: vtop-engine
    topic_include_regex: ".*"
    topic_exclude_regex: "^__.*"
    auto_offset_reset: earliest
    enable_auto_commit: false   # MUST be false — offsets commit only after VERIFIED

  file:
    enabled: true
    paths:
      - /data/input/*.log
      - /data/input/*-cef

  syslog_spool:
    enabled: true
    paths:
      - /data/spool/*.log

upload:
  backend: s3_native            # s3_native | s3cmd | awscli | minio | mock
  # One bucket per data format: "{format}" resolves to cef/leef/json/jsonl/
  # syslog/raw. Use a plain name (e.g. "telemetry-data") for a single bucket.
  bucket: "telemetry-{format}"
  prefix: ""
  endpoint_url: http://minio:9000
  region: us-east-1
  force_path_style: true
  # verify_tls: true (the default) REQUIRES an https:// endpoint — a plaintext
  # endpoint is then a startup error. false is the explicit lab opt-out that
  # permits plaintext (this lab's MinIO). It does NOT disable certificate
  # verification on https endpoints; private CAs go in the system trust store.
  verify_tls: false
  create_bucket: true           # auto-create per-format buckets on first use
  # Default true: VERIFIED requires a digest derived from stored content (or a
  # storage-service-computed digest). Set false only for explicit size-only
  # compatibility/lab operation.
  require_strong_verification: true

partitioning:
  template: "tenant={tenant}/source={source}/format={format}/year={yyyy}/month={mm}/day={dd}/hour={hh}/"
