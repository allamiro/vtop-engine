# Stream mappings: bind a discovered source name to a tenant, telemetry format,
# object-storage source name, and retention class. Source names are NEVER
# hardcoded in the engine — these mappings are config-driven, and the names
# below match the topics seeded by the docker lab (docker-compose.yml).
#
# `format` is OPTIONAL. If a source has NO mapping here, the engine auto-detects
# its format (CEF / JSON / JSONL / syslog / text) from the data — so different
# formats can flow through the same engine at once. Add a mapping only to
# override detection or to set a tenant, storage rename, or retention class.
#
# In the lab: cef_events is mapped explicitly below; json_events,
# syslog_events, and mixed_events are intentionally left UNMAPPED so you can see
# auto-detection label each batch correctly.

streams:
  - source_name: cef_events          # Kafka topic of CEF security events (lab)
    source_type: kafka
    format: cef
    tenant: default
    s3_source_name: security
    retention_class: standard

  # Example file source (CEF). Drop a file at this path to archive it.
  - source_name: /data/input/auth.cef.log
    source_type: file
    format: cef
    tenant: default
    s3_source_name: auth
    retention_class: standard
