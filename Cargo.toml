[workspace]
resolver = "2"
members = [
  "crates/vtop-core",
  "crates/vtop-adapters",
  "crates/vtop-upload",
  "crates/vtop-state",
  "crates/vtop-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["VTOP Engine contributors"]
description = "Verified Telemetry Object Protocol Engine — a replay-safe, manifest-driven telemetry object transfer engine (prototype / reference implementation)."

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
rdkafka = { version = "0.37", features = ["cmake-build", "ssl", "sasl"] }
aws-config = { version = "1", features = ["behavior-version-latest"] }
aws-sdk-s3 = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
thiserror = "2"
anyhow = "1"
async-trait = "0.1"
sha2 = "0.10"
blake3 = "1"
hex = "0.4"
base64 = "0.22"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
flate2 = "1"
zstd = "0.13"
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "chrono", "uuid"] }
glob = "0.3"
notify = "8"
tempfile = "3"
bytes = "1"
futures = "0.3"
regex = "1"

# Internal crates
vtop-core = { path = "crates/vtop-core" }
vtop-adapters = { path = "crates/vtop-adapters" }
vtop-upload = { path = "crates/vtop-upload" }
vtop-state = { path = "crates/vtop-state" }

[profile.release]
opt-level = 3
lto = "thin"
strip = true        # drop symbols → smaller binary / container image
codegen-units = 1   # better optimization (slightly slower build)
