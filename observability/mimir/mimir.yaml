# Mimir — single-binary, filesystem storage. LAB ONLY: no HA, no object storage,
# no retention tuning. Production wants object storage + a real topology.
multitenancy_enabled: false

server:
  http_listen_port: 9009
  log_level: warn

common:
  storage:
    backend: filesystem
    filesystem:
      dir: /data/mimir

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/blocks
  tsdb:
    dir: /data/mimir/tsdb

compactor:
  data_dir: /data/mimir/compactor
  sharding_ring:
    kvstore: { store: memberlist }

distributor:
  ring:
    kvstore: { store: memberlist }

ingester:
  ring:
    kvstore: { store: memberlist }
    replication_factor: 1   # single node

store_gateway:
  sharding_ring:
    replication_factor: 1

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/ruler

limits:
  # The lab produces bursty batches; keep ingestion permissive so a load test
  # is not silently throttled into a misleading flat line.
  ingestion_rate: 100000
  ingestion_burst_size: 200000
  max_global_series_per_user: 0

# No outbound usage reporting from a local lab (Loki and Tempo are disabled the
# same way).
usage_stats:
  enabled: false
