# Tempo — single-binary, filesystem storage. LAB ONLY.
#
# Wired up ahead of the engine actually emitting traces (issue #46): the pipeline
# stage timings the engine already measures ARE a trace, they simply have no
# exporter yet. Until then Tempo runs idle rather than being absent, so adding
# OTLP export needs no stack change.
server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

usage_report:
  reporting_enabled: false
