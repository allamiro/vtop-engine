apiVersion: 1

providers:
  - name: vtop
    orgId: 1
    folder: VTOP
    type: file
    disableDeletion: false
    # Dashboards are code in this repo, but UI edits are ALLOWED so the panels
    # can be explored and tweaked live. Provisioning still re-reads the disk
    # files, which remain the source of truth for what ships. (Set false to make
    # the disk authoritative and reject UI saves.)
    allowUiUpdates: true
    updateIntervalSeconds: 15
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
