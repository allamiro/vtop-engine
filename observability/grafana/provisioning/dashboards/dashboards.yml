apiVersion: 1

# NO file-provisioned dashboards, deliberately.
#
# Grafana 13 serves dashboards through unified storage, and a FILE-PROVISIONED
# dashboard is read-only in the UI there: "Save" is refused with "Cannot save
# provisioned dashboard", and `allowUiUpdates: true` no longer changes that (it
# was honoured by the legacy provisioning path). Deleting one is refused too.
#
# The lab is meant to be explored - panels tweaked, queries edited, layouts
# rearranged - so the dashboards are SEEDED THROUGH THE API instead (see the
# `grafana-seed` service in docker-compose.observability.yml). Seeded dashboards
# are ordinary dashboards: fully editable and saveable.
#
# The generated JSON under observability/grafana/dashboards/ is still the source
# of truth for what ships; CI fails if it drifts from the generators. Re-running
# the seeder re-applies the repo version and discards local edits.
providers: []
