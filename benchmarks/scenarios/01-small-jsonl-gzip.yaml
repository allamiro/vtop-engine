name: small-jsonl-gzip
description: 1k small JSON Lines files, gzip + sha256, in-memory backend.
volume: 1000
file_size: small
format: jsonl
compression: gzip
checksum: sha256
backend: mock
batch_max_records: 10000
batch_max_bytes: 104857600
batch_max_age_seconds: 60
duration_seconds: 0
fault: none
sys_sample_interval: 0.5
