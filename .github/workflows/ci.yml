name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: fmt + clippy + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # librdkafka (cmake-build feature) needs cmake + a C toolchain + SSL/SASL.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang libssl-dev libsasl2-dev pkg-config

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --workspace

      - name: Release build
        run: cargo build --release --bin vtopctl

  docker:
    name: docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build engine image
        run: docker build -f docker/Dockerfile -t vtop-engine:ci .
