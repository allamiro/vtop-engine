name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: fmt + clippy + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # librdkafka (cmake-build feature) builds from source. It needs cmake + a
      # C toolchain, SSL + SASL, zlib, and libcurl (the SASL OAUTHBEARER/OIDC
      # path #includes <curl/curl.h> even when WITH_CURL=0).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang libssl-dev libsasl2-dev libcurl4-openssl-dev zlib1g-dev pkg-config

      - name: Cache cargo registry and target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --workspace

      - name: Release build
        run: cargo build --release --bin vtopctl

  docker:
    name: docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build engine image
        run: docker build -f docker/Dockerfile -t vtop-engine:ci .

  audit:
    name: supply-chain (cargo audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      # Prebuilt cargo-audit binary (fast; no compile).
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # Reads .cargo/audit.toml: fails on any advisory NOT documented there,
      # so new/actionable vulnerabilities block the build while known
      # unfixable transitive ones (tracked in docs/SECURITY_MODEL.md) are
      # still printed in the log as "ignored".
      - name: Audit dependencies
        run: cargo audit
