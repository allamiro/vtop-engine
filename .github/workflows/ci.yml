name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: fmt + clippy + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # librdkafka (cmake-build feature) builds from source. It needs cmake + a
      # C toolchain, SSL + SASL, zlib, and libcurl (the SASL OAUTHBEARER/OIDC
      # path #includes <curl/curl.h> even when WITH_CURL=0).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang libssl-dev libsasl2-dev libcurl4-openssl-dev zlib1g-dev pkg-config

      - name: Cache cargo registry and target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        # --locked: a Cargo.lock that does not match Cargo.toml must FAIL
        # rather than be silently regenerated. Without it a dependency can be
        # added with no lockfile entry and builds then resolve versions that were
        # never tested - which had already happened before this guard existed.
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test workspace
        run: cargo test --workspace --locked

      - name: Release build
        run: cargo build --release --bin vtopctl --locked

  docker:
    name: docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Build engine image
        run: docker build -f docker/Dockerfile -t vtop-engine:ci .

  audit:
    name: supply-chain (cargo audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      # Prebuilt cargo-audit binary (fast; no compile).
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # Reads .cargo/audit.toml: fails on any advisory NOT documented there,
      # so new/actionable vulnerabilities block the build while known
      # unfixable transitive ones (tracked in docs/SECURITY_MODEL.md) are
      # still printed in the log as "ignored".
      - name: Audit dependencies
        run: cargo audit

  # The lab shell scripts have already produced real defects (broken pick()
  # array indexing, a port off-by-one, and PARTITIONS=0 passing validation only
  # to fail Kafka topic creation silently), so they are linted and tested like
  # any other code.
  shell:
    name: shellcheck + bats
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # Pinned to reviewed versions rather than the mutable `stable`/`latest`
      # tags, so a tool update cannot change CI results without a commit.
      # Dependabot's docker ecosystem does not scan workflow `docker run` lines,
      # so these are bumped deliberately.
      - name: shellcheck
        run: |
          docker run --rm -v "$PWD:/mnt" -w /mnt \
            koalaman/shellcheck:v0.11.0 docker/*.sh

      - name: bats
        run: |
          docker run --rm -v "$PWD:/code" -w /code \
            bats/bats:1.13.0 docker/tests/

  # Kafka was entirely untested in CI, which is how a P0 shipped: every read
  # returned zero records (a subscribe() per read forced a rebalance that
  # reseeked to earliest and ate the poll window), so no batch ever sealed - and
  # CI stayed green because nothing here talked to a broker.
  #
  # The broker advertises localhost so the host-run test connects over the mapped
  # port without an /etc/hosts entry.
  kafka-integration:
    name: kafka integration (live broker)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      kafka:
        image: apache/kafka:4.3.1
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 12
          --health-start-period 20s
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-kafka-it-${{ hashFiles('**/Cargo.lock') }}

      - name: Install librdkafka build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang libssl-dev libsasl2-dev libcurl4-openssl-dev zlib1g-dev pkg-config

      # Seed a topic with real records. The tests assert a NON-EMPTY read, so an
      # empty topic would make them fail rather than pass vacuously.
      - name: Seed the it_events topic
        run: |
          set -euo pipefail
          cid=$(docker ps --filter "ancestor=apache/kafka:4.3.1" --format '{{.ID}}' | head -1)
          docker exec "$cid" /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 \
            --create --if-not-exists --topic it_events --partitions 1 --replication-factor 1
          bash docker/seed-events.sh cef 40 \
            | docker exec -i "$cid" /opt/kafka/bin/kafka-console-producer.sh \
                --bootstrap-server localhost:9092 --topic it_events
          docker exec "$cid" /opt/kafka/bin/kafka-get-offsets.sh \
            --bootstrap-server localhost:9092 --topic it_events

          # Warm up the group coordinator before the tests run. The adapter
          # assigns Offset::Stored, which asks the broker for the consumer
          # group's committed offsets; that needs the group coordinator and the
          # __consumer_offsets topic, which a FRESH broker creates only lazily on
          # the first group operation. Until it exists, consumers get
          # "NotCoordinator" and every read fails. Consuming once under a
          # throwaway group forces it into existence.
          #
          # This is why the job failed on its first run but passed locally: a
          # long-lived local broker already had __consumer_offsets.
          docker exec "$cid" /opt/kafka/bin/kafka-console-consumer.sh \
            --bootstrap-server localhost:9092 --topic it_events \
            --group ci-warmup --from-beginning --max-messages 1 --timeout-ms 30000
          docker exec "$cid" /opt/kafka/bin/kafka-consumer-groups.sh \
            --bootstrap-server localhost:9092 --list

      - name: Run live-broker integration tests
        env:
          VTOP_TEST_KAFKA: localhost:9092
        run: cargo test -p vtop-cli --test integration_kafka_to_minio -- --ignored
  # cargo-deny covers what cargo-audit does not: license compliance, dependency
  # bans, and source provenance. Advisory decisions are mirrored from
  # .cargo/audit.toml (the single source of truth) so the two cannot disagree.
  deny:
    name: supply-chain (cargo deny)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  # The MSRV is a tested promise, not a number in a file: this builds on exactly
  # the declared toolchain. The floor is set by the aws-sdk crates (rust-version
  # 1.91.1), so lowering it means dropping or pinning those.
  msrv:
    name: msrv (build on declared rust-version)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Read rust-version from Cargo.toml
        id: msrv
        run: |
          set -euo pipefail
          v=$(grep -m1 '^rust-version' Cargo.toml | cut -d'"' -f2)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "declared MSRV: $v"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-msrv-${{ steps.msrv.outputs.version }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Install librdkafka build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang libssl-dev libsasl2-dev libcurl4-openssl-dev zlib1g-dev pkg-config
      - run: cargo check --workspace --all-targets

  # Coverage is reported, NOT gated: a threshold invites tests written to move a
  # number. The summary makes gaps visible on each PR so they can be judged.
  coverage:
    name: coverage (report only)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.lock') }}
      - name: Install librdkafka build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang libssl-dev libsasl2-dev libcurl4-openssl-dev zlib1g-dev pkg-config
      # Run the instrumented suite ONCE and reuse its output. Calling
      # cargo llvm-cov again just to format the summary would recompile and
      # re-run every workspace test for no new information.
      - name: Collect coverage
        run: |
          cargo llvm-cov --workspace --summary-only \
            --ignore-filename-regex '(tests?/|benchmarks/)' | tee /tmp/coverage.txt
      - name: Publish summary
        if: always()
        run: |
          {
            echo '## Coverage'
            echo '```'
            tail -25 /tmp/coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
  # The benchmark harness had zero tests while accumulating real defects
  # (double-counted input bytes, silently dropped child runs, unescaped Markdown
  # tables, a write-after-close race, a large-binary OOM, swallowed YAML errors).
  # Only manual review was protecting it.
  benchmarks:
    name: benchmarks (ruff + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: benchmarks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test tooling
        run: pip install --disable-pip-version-check pytest pyyaml ruff

      - name: ruff
        run: ruff check .

      - name: pytest
        run: python -m pytest

      # The harness must keep working where PyYAML is absent - that fallback is
      # the whole reason load_scenario() has two code paths - so prove the suite
      # passes without it too, rather than assuming. The PyYAML-specific tests
      # live in their own module and skip themselves; everything else must still
      # run and pass.
      - name: pytest without PyYAML (fallback parser path)
        run: |
          pip uninstall -y pyyaml
          python -m pytest

  # The whole stack, assembled and asserted end to end. Unit and integration
  # tests never run the real compose lab, which is exactly how the Kafka
  # ingestion P0 shipped with CI fully green. Verified this job catches it:
  # re-introducing that bug fails "no committed batch for source type: kafka"
  # while file/syslog still pass - the precise signature of the original defect.
  e2e-smoke:
    name: e2e smoke (full compose lab)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Build the engine image once, up front: the script's `compose up` would
      # otherwise build it inside the timed wait loop and could time out on a
      # cold cache rather than on a real failure.
      - name: Build the engine image
        run: docker compose build vtop-engine

      - name: Run the end-to-end smoke test
        env:
          TIMEOUT: "300"
        run: bash scripts/e2e-smoke.sh

      # The script itself dumps engine logs on failure BEFORE its exit trap tears
      # the stack down, so the real diagnostics are already in the job output
      # above. This is a best-effort fallback; the container is usually gone by
      # now, which is expected.
      - name: Engine logs on failure (best effort)
        if: failure()
        run: docker compose logs --tail=100 vtop-engine 2>/dev/null || echo "stack already torn down; see the smoke output above"

  # Fuzzing (issue #25): detect.rs and manifest deserialization both parse
  # UNTRUSTED bytes, so they must never panic. This is a bounded SMOKE run - a
  # short campaign from the committed seed corpus that fails the build if any
  # target crashes. It is not a substitute for long out-of-band fuzzing, but it
  # catches regressions on every PR. cargo-fuzz needs nightly + libFuzzer.
  fuzz:
    name: fuzz smoke (detect + manifest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: ${{ runner.os }}-fuzz-${{ hashFiles('**/Cargo.lock', 'fuzz/Cargo.toml') }}
      - name: Smoke-fuzz each target (fails on any crash)
        run: |
          for t in detect_record detect_batch manifest_parse; do
            echo "::group::fuzz $t"
            cargo +nightly fuzz run "$t" -- -max_total_time=60 -print_final_stats=1
            echo "::endgroup::"
          done

  # Mutation testing (issue #25): measure whether the suite actually catches
  # injected faults. REPORT ONLY - never gates the build (continue-on-error) -
  # and scoped to the highest-value modules so a run finishes in CI time.
  mutants:
    name: mutation testing (report only)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: Install librdkafka build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake clang libssl-dev libsasl2-dev libcurl4-openssl-dev zlib1g-dev pkg-config
      - name: Run cargo-mutants on the core logic
        run: |
          cargo mutants --package vtop-core \
            --file 'crates/vtop-core/src/detect.rs' \
            --file 'crates/vtop-core/src/state_machine.rs' \
            --file 'crates/vtop-core/src/batch.rs' \
            --timeout 120 --no-shuffle | tee /tmp/mutants.txt || true
      - name: Publish summary
        if: always()
        run: |
          {
            echo '## Mutation testing (report only)'
            echo '```'
            tail -40 /tmp/mutants.txt 2>/dev/null || echo "no output"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
